name: Performance & Load Testing

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  performance-check:
    runs-on: ubuntu-latest

    services:
      # Database and Redis are required for performance testing
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
      REDIS_URL: redis://localhost:6379/1
      CELERY_BROKER_URL: redis://localhost:6379/0
      SECRET_KEY: "performance-test-key"

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install locust  # Load testing tool

    - name: Run Migrations
      run: python manage.py migrate

    - name: Start Celery Worker
      run: |
        # Start worker in background
        celery -A config worker --loglevel=info &
        sleep 5

    - name: Run Performance Smoke Test
      run: |
        # Run Django in the background
        python manage.py runserver &
        sleep 5
        # Use Locust to simulate 50 users hitting the cached summary endpoint
        # Fail the build if the failure rate is above 1% or response > 500ms
        locust -f scripts/load_test.py --headless -u 50 -r 10 --run-time 30s --host http://localhost:8000 --stop-timeout 10
